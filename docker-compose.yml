services:

  qdrant:
    image: qdrant/qdrant:latest
    container_name: geminiclaw-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - geminiclaw-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5

  geminiclaw:
    build:
      context: .
      dockerfile: containers/Dockerfile
    container_name: geminiclaw-app
    restart: unless-stopped
    env_file: .env
    environment:
      - HOST_PROJECT_PATH=${PWD}
      - QDRANT_URL=http://geminiclaw-qdrant:6333
    volumes:
      - ./store:/app/store
      - ./outputs:/app/outputs
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock   # runner spawna containers filhos
    networks:
      - geminiclaw-net
    depends_on:
      qdrant:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    container_name: geminiclaw-ollama
    profiles: ["local-llm"]
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - geminiclaw-net
    # No Pi 5, recomenda-se usar Ollama nativo para melhor performance.
    # Este serviço é útil para desenvolvimento em x86 ou se preferir isolamento.

volumes:
  qdrant_data:
  ollama_data:

networks:
  geminiclaw-net:
    driver: bridge
