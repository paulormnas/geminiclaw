services:

  qdrant:
    build:
      context: .
      dockerfile: containers/Dockerfile.qdrant
    container_name: geminiclaw-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - geminiclaw-net
    environment:
      QDRANT__TELEMETRY_DISABLED: "true"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: geminiclaw-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-geminiclaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-geminiclaw_secret}
      POSTGRES_DB: ${POSTGRES_DB:-geminiclaw}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    networks:
      - geminiclaw-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-geminiclaw}"]
      interval: 10s
      timeout: 5s
      retries: 5

  geminiclaw:
    build:
      context: .
      dockerfile: containers/Dockerfile
    container_name: geminiclaw-app
    restart: unless-stopped
    env_file: .env
    environment:
      - HOST_PROJECT_PATH=${PWD}
      - QDRANT_URL=http://geminiclaw-qdrant:6333
      - DATABASE_URL=postgresql://${POSTGRES_USER:-geminiclaw}:${POSTGRES_PASSWORD:-geminiclaw_secret}@geminiclaw-postgres:5432/${POSTGRES_DB:-geminiclaw}
    volumes:
      - ./store:/app/store
      - ./outputs:/app/outputs
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock   # runner spawna containers filhos
    networks:
      - geminiclaw-net
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    container_name: geminiclaw-ollama
    profiles: ["local-llm"]
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - geminiclaw-net
    # No Pi 5, recomenda-se usar Ollama nativo para melhor performance.
    # Este serviço é útil para desenvolvimento em x86 ou se preferir isolamento.

volumes:
  postgres_data:
  qdrant_data:
  ollama_data:

networks:
  geminiclaw-net:
    driver: bridge
